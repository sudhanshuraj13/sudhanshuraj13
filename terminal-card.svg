<svg width="1200" height="420" viewBox="0 0 1200 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Animated terminal workflow">
  <defs>
    <linearGradient id="panel" x1="0" y1="0" x2="1200" y2="420" gradientUnits="userSpaceOnUse">
      <stop stop-color="#020617"/>
      <stop offset="0.55" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="accent" x1="80" y1="0" x2="1120" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#d946ef"/>
      <stop offset="0.45" stop-color="#8b5cf6"/>
      <stop offset="1" stop-color="#22c55e"/>
      <animateTransform attributeName="gradientTransform" type="translate" values="-260 0;260 0;-260 0" dur="8s" repeatCount="indefinite"/>
    </linearGradient>
    <filter id="soft-glow" x="-10%" y="-20%" width="120%" height="140%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace; }
      .title { font-size: 25px; font-weight: 700; fill: #e5e7eb; }
      .line { font-size: 23px; fill: #cbd5e1; }
      .muted { fill: #94a3b8; }
      .magenta { fill: #d946ef; }
      .green { fill: #22c55e; }
      .purple { fill: #a855f7; }
      .cmd { opacity: 0; animation: show 12s ease-in-out infinite; }
      .cmd2 { animation-delay: 1.8s; }
      .cmd3 { animation-delay: 3.6s; }
      .cmd4 { animation-delay: 5.4s; }
      .cmd5 { animation-delay: 7.2s; }
      .cursor { animation: blink 1s steps(2, start) infinite; }
      .float { animation: float 6s ease-in-out infinite; }
      @keyframes show {
        0%, 8% { opacity: 0; transform: translateY(8px); }
        14%, 78% { opacity: 1; transform: translateY(0); }
        90%, 100% { opacity: 0; transform: translateY(-8px); }
      }
      @keyframes blink {
        50% { opacity: 0; }
      }
      @keyframes float {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-10px); }
      }
    </style>
  </defs>
 
  <rect width="1200" height="420" rx="28" fill="url(#panel)"/>
  <rect x="2" y="2" width="1196" height="416" rx="26" stroke="url(#accent)" stroke-width="4" opacity="0.9"/>
  <rect x="42" y="36" width="1116" height="348" rx="20" fill="#020617" opacity="0.92" stroke="#1e293b"/>
  <rect x="42" y="36" width="1116" height="58" rx="20" fill="#0f172a"/>
  <rect x="42" y="74" width="1116" height="20" fill="#0f172a"/>
 
  <circle cx="78" cy="65" r="8" fill="#ef4444"/>
  <circle cx="105" cy="65" r="8" fill="#f59e0b"/>
  <circle cx="132" cy="65" r="8" fill="#22c55e"/>
 
  <text x="178" y="74" class="mono title">sudhanshu / ai-backend-engineer</text>
  <text x="900" y="74" class="mono line muted">agents online</text>
  <circle cx="1098" cy="65" r="9" fill="#22c55e" filter="url(#soft-glow)">
    <animate attributeName="opacity" values="0.35;1;0.35" dur="2.2s" repeatCount="indefinite"/>
  </circle>
 
  <g class="mono">
    <g class="cmd cmd1">
      <text x="82" y="135" class="line"><tspan class="green">$</tspan> profile build --focus ai+backend --mode healthcare</text>
    </g>
    <g class="cmd cmd2">
      <text x="82" y="183" class="line"><tspan class="magenta">✓</tspan> RAG systems · multi-agent orchestration · backend infra</text>
    </g>
    <g class="cmd cmd3">
      <text x="82" y="231" class="line"><tspan class="magenta">✓</tspan> Python · TypeScript · JavaScript · C++ · Node.js</text>
    </g>
    <g class="cmd cmd4">
      <text x="82" y="279" class="line"><tspan class="purple">→</tspan> Building: ArogyaOS · SIH RAG Assistant · A.R.G.U.S.</text>
    </g>
    <g class="cmd cmd5">
      <text x="82" y="327" class="line"><tspan class="green">intern</tspan> Backend &amp; AI Engineering @ Clinixs</text>
    </g>
  </g>
 
  <rect x="82" y="350" width="18" height="28" rx="3" fill="#d946ef" class="cursor"/>
 
  <g class="float" opacity="0.9">
    <path d="M946 148 L1004 182 L946 216 L888 182 Z" fill="#7e22ce" opacity="0.65"/>
    <path d="M946 116 L1004 150 L946 184 L888 150 Z" fill="#d946ef" opacity="0.85"/>
    <path d="M1004 150 V215 L946 249 V184 Z" fill="#a855f7" opacity="0.65"/>
    <path d="M888 150 V215 L946 249 V184 Z" fill="#22c55e" opacity="0.55"/>
    <circle cx="946" cy="182" r="18" fill="#020617" stroke="#f0abfc" stroke-width="4"/>
  </g>
</svg>
